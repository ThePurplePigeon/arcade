name: Arcade CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Download Dalamud
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

    - name: Restore
      run: dotnet restore .\Arcade.sln

    - name: Build
      run: dotnet build .\Arcade.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test .\Arcade.sln --configuration Release --no-build -v minimal

    - name: Store artifacts
      uses: actions/upload-artifact@v7
      with:
        name: Arcade
        path: .\Arcade\bin\x64\Release\*
        if-no-files-found: error
        retention-days: 1
